# .github/workflows/deploy.yml
# CI/CD — build SCSS and deploy to martindube.net
# TODO: configure FTP/SSH secrets in GitHub repo settings

name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile SCSS
        run: npm run build

